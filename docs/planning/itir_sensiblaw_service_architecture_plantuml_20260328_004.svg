<?plantuml 1.2026.2?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="ACTIVITY" height="1060px" preserveAspectRatio="none" style="width:382px;height:1060px;background:#FFFFFF;" version="1.1" viewBox="0 0 382 1060" width="382px" zoomAndPan="magnify"><title>Standard Case Flow</title><defs/><g><g class="title" data-source-line="161"><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="136.2475" x="121.3912" y="34.9659">Standard Case Flow</text></g><ellipse cx="192.0149" cy="60.0679" fill="#222222" rx="10" ry="10" style="stroke:#222222;stroke-width:1;"/><rect fill="#F1F1F1" height="36.3441" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="84.7045" x="149.6627" y="90.0679"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="64.7045" x="159.6627" y="112.896">Case intake</text><rect fill="#F1F1F1" height="36.3441" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="118.1007" x="132.9646" y="146.412"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="98.1007" x="142.9646" y="169.2401">Classify case type</text><rect fill="#F1F1F1" height="36.3441" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="154.341" x="114.8444" y="202.7561"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="134.341" x="124.8444" y="225.5842">Assess risk and urgency</text><rect fill="#F1F1F1" height="36.3441" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="189.9212" x="97.0543" y="259.1003"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="169.9212" x="107.0543" y="281.9283">Collect evidence and narrative</text><rect fill="#555555" height="6" rx="2.5" ry="2.5" style="stroke:#555555;stroke-width:1;" width="360.